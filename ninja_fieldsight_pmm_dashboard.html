<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ninja FieldSight — Operations Terminal</title>
<style>
/* =============================================================
   NINJA FIELDSIGHT — FIELD OPERATIONS TERMINAL
   Design: Editorial × Operational. Dark surface, cream paper,
   serif display + mono data, hairline rules, indexed everything.
   ============================================================= */

@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Inter+Tight:wght@300..800&family=JetBrains+Mono:wght@300..700&display=swap');

:root {
  /* CORE PALETTE */
  --ink:        #0A0908;    /* almost-black surface */
  --ink-2:      #14130F;    /* slight elevation */
  --ink-3:      #1F1D17;    /* card background */
  --rule:       #2E2A22;    /* hairlines on dark */
  --rule-2:     #443F33;    /* secondary hairlines */
  --paper:      #F5F1E8;    /* warm cream text */
  --paper-dim:  #B8B2A0;    /* muted cream */
  --paper-faint:#7A7464;    /* very muted */
  --accent:     #E63946;    /* alarm red — used sparingly */
  --accent-dim: #8B1F26;
  --signal:     #D4A857;    /* warm gold for highlights */
  --signal-dim: #7A6332;
  --positive:   #6FA85C;    /* muted green */

  /* TYPE */
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Inter Tight', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  /* LAYOUT */
  --sidebar-w: 260px;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01" on, "cv11" on;
}

/* === GRAIN OVERLAY (subtle CRT/film grain feel) === */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 200;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(255,255,255,0.012) 2px,
      rgba(255,255,255,0.012) 3px
    );
  mix-blend-mode: overlay;
}

/* === APP SHELL === */
.app-shell { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--ink-2);
  border-right: 1px solid var(--rule);
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column;
}

.sidebar-brand {
  padding: 24px 24px 20px;
  border-bottom: 1px solid var(--rule);
  position: relative;
}
.sidebar-brand::after {
  content: 'OPS//FIELDSIGHT';
  position: absolute;
  bottom: 6px; right: 24px;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  color: var(--paper-faint);
}

.brand-line {
  display: flex; align-items: baseline; gap: 0;
  font-family: var(--font-body);
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.04em;
  line-height: 1;
}
.brand-line .red { color: var(--accent); }
.brand-line .cream { color: var(--paper); }

.brand-client {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px dashed var(--rule);
  display: flex; flex-direction: column;
  gap: 2px;
}
.brand-client .eyebrow {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--paper-faint);
}
.brand-client .name {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 18px;
  font-weight: 500;
  color: var(--paper);
  letter-spacing: -0.01em;
}

/* === SIDEBAR NAV === */
.sidebar-nav {
  flex: 1;
  padding: 16px 0;
  overflow-y: auto;
}
.sidebar-item {
  display: flex; flex-direction: column;
  width: 100%;
  padding: 12px 24px;
  background: transparent;
  border: 0;
  text-align: left;
  cursor: pointer;
  position: relative;
  transition: background 0.18s, color 0.18s;
  font-family: var(--font-body);
}
.sidebar-item::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  width: 3px; height: 0;
  background: var(--accent);
  transform: translateY(-50%);
  transition: height 0.22s ease;
}
.sidebar-item:hover { background: rgba(255,255,255,0.025); }
.sidebar-item-active { background: rgba(255,255,255,0.04); }
.sidebar-item-active::before { height: 22px; }

.sidebar-item-row {
  display: flex; align-items: center; gap: 10px;
}
.sidebar-item-idx {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--paper-faint);
  font-weight: 500;
  width: 18px;
}
.sidebar-item-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--paper);
  letter-spacing: -0.005em;
}
.sidebar-item-active .sidebar-item-label { color: var(--paper); font-weight: 600; }
.sidebar-item-accent .sidebar-item-label { color: var(--paper); }
.sidebar-item-active.sidebar-item-accent::before { background: var(--accent); }

.sidebar-item-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--paper-faint);
  margin-top: 3px;
  padding-left: 28px;
  letter-spacing: 0.04em;
}

.sidebar-section-divider {
  padding: 18px 24px 8px;
  margin-top: 10px;
  border-top: 1px solid var(--rule);
}
.sidebar-section-divider .label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--paper-faint);
}
.sidebar-item-admin .sidebar-item-label { color: var(--paper-dim); }
.sidebar-item-admin.sidebar-item-active .sidebar-item-label { color: var(--paper); }

.sidebar-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--rule);
  font-family: var(--font-mono);
}
.sidebar-foot .label {
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--paper-faint);
  margin-bottom: 6px;
}
.sidebar-foot .value {
  font-size: 11px;
  color: var(--paper);
  word-break: break-all;
  line-height: 1.4;
}
.live-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--positive);
  border-radius: 50%;
  margin-right: 6px;
  box-shadow: 0 0 0 2px rgba(111,168,92,0.2);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* === MAIN AREA === */
.main-area {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: var(--ink);
  position: relative;
}

/* Top status strip — runs above filters, shows operational status */
.status-strip {
  display: flex; align-items: center;
  border-bottom: 1px solid var(--rule);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--paper-faint);
  height: 32px;
}
.status-strip > div {
  padding: 0 18px;
  height: 100%;
  display: flex; align-items: center;
  border-right: 1px solid var(--rule);
}
.status-strip .status-marquee {
  flex: 1;
  border-right: 0;
  justify-content: flex-end;
}
.status-strip .live { color: var(--positive); }

/* Filters */
.filters-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 14px 28px;
  border-bottom: 1px solid var(--rule);
  background: var(--ink-2);
}
.filters-bar .section-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--paper-faint);
  padding-right: 8px;
  border-right: 1px solid var(--rule);
  margin-right: 8px;
}

select, input[type=date], input[type=text] {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 7px 10px;
  border: 1px solid var(--rule-2);
  background: var(--ink);
  color: var(--paper);
  border-radius: 0;
  letter-spacing: 0.02em;
}
select:focus, input[type=date]:focus, input[type=text]:focus {
  outline: none;
  border-color: var(--paper);
}
input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.5); }
.search-input { flex: 1; min-width: 200px; }

.content { padding: 32px 28px 64px; max-width: 1280px; }

/* === EYEBROW, TITLES, RULES === */
.eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--paper-faint);
  font-weight: 500;
}
.eyebrow-accent { color: var(--accent); }
.eyebrow-signal { color: var(--signal); }

.h-display {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 44px;
  line-height: 1;
  letter-spacing: -0.025em;
  color: var(--paper);
}
.h-display em {
  font-style: italic;
  font-weight: 300;
  color: var(--signal);
}
.h-section {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 26px;
  line-height: 1.1;
  letter-spacing: -0.015em;
  color: var(--paper);
}
.h-section em { font-style: italic; font-weight: 300; }
.h-sub {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--paper-dim);
  line-height: 1.5;
  max-width: 64ch;
}

/* Numbered index — used to mark each block */
.idx-marker {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--paper-faint);
}

/* === CARDS === */
.card {
  background: var(--ink-2);
  border: 1px solid var(--rule);
  position: relative;
}
.card-darker { background: var(--ink); border: 1px solid var(--rule); }
.card-paper { background: var(--paper); color: var(--ink); border: 1px solid var(--rule); }

/* Card heading row — eyebrow + index marker */
.card-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--rule);
}
.card-head-stack { display: flex; flex-direction: column; gap: 6px; }

/* === KPI HERO === */
.kpi-hero-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}
.kpi {
  background: var(--ink-2);
  padding: 22px 24px;
  position: relative;
  min-height: 138px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.kpi-hero {
  background: var(--ink-3);
  padding: 28px 30px;
}
.kpi-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
}
.kpi-eyebrow {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--paper-faint);
}
.kpi-idx { color: var(--paper-faint); }
.kpi-num {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 56px;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--paper);
  font-variant-numeric: tabular-nums;
}
.kpi-hero .kpi-num {
  font-size: 76px;
  color: var(--accent);
}
.kpi-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--paper-dim);
  letter-spacing: 0.04em;
}
.kpi-delta {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--signal);
  margin-left: 8px;
}

/* === BRAND BARS === */
.bar-row {
  padding: 12px 0;
  cursor: pointer;
  transition: opacity 0.2s;
}
.bar-row + .bar-row { border-top: 1px dashed var(--rule); }
.bar-row.dim { opacity: 0.35; }
.bar-row-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 8px;
  gap: 12px;
}
.bar-row-name {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
  font-size: 19px;
  letter-spacing: -0.01em;
  color: var(--paper);
}
.bar-row-name-pmm { color: var(--accent); }
.bar-row-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--paper-dim);
  font-variant-numeric: tabular-nums;
}
.bar-row-num .pct {
  font-size: 14px;
  font-weight: 600;
  color: var(--paper);
}
.bar-track {
  height: 4px;
  background: var(--rule);
  position: relative;
  overflow: hidden;
}
.bar-fill {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  background: var(--paper);
  transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.bar-fill-pmm { background: var(--accent); }
.bar-pill {
  display: inline-block;
  padding: 2px 6px;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  margin-left: 6px;
  vertical-align: 3px;
}
.bar-pill-pmm { background: var(--accent); color: var(--paper); }
.bar-pill-filter { background: var(--paper); color: var(--ink); }

/* === CROSS-CUT CARDS === */
.xcut-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}
.xcut {
  background: var(--ink-2);
  padding: 22px 22px 26px;
  text-align: left;
  border: 0;
  cursor: pointer;
  color: inherit;
  position: relative;
  transition: background 0.2s;
  display: flex; flex-direction: column;
  font-family: inherit;
  min-height: 200px;
}
.xcut:hover { background: var(--ink-3); }
.xcut-tag {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.24em;
  font-weight: 600;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 14px;
}
.xcut-tag::before {
  content: '';
  width: 6px; height: 6px;
  background: currentColor;
}
.xcut-num {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 52px;
  line-height: 0.95;
  letter-spacing: -0.04em;
  color: var(--paper);
  font-variant-numeric: tabular-nums;
  margin-bottom: 12px;
}
.xcut-label {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
  font-size: 15px;
  line-height: 1.35;
  color: var(--paper);
  margin-bottom: 8px;
  flex: 1;
}
.xcut-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--paper-faint);
  letter-spacing: 0.04em;
}

/* === DONUT === */
.donut-wrap {
  display: flex; align-items: center; gap: 28px;
  padding: 18px 22px 22px;
}
.donut-svg { flex-shrink: 0; }
.donut-slice {
  cursor: pointer;
  transition: opacity 0.18s;
}
.donut-center {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 30px;
  fill: var(--paper);
}
.donut-center-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  fill: var(--paper-faint);
  text-transform: uppercase;
}
.donut-legend { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.donut-legend-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px;
  cursor: pointer;
  transition: background 0.15s;
  font-family: var(--font-mono);
  font-size: 11px;
}
.donut-legend-row:hover { background: rgba(255,255,255,0.03); }
.donut-legend-row.active { background: rgba(255,255,255,0.06); }
.donut-legend-left { display: flex; align-items: center; gap: 10px; }
.donut-swatch {
  width: 10px; height: 10px;
  flex-shrink: 0;
}
.donut-legend-name {
  color: var(--paper);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
}
.donut-legend-val {
  display: flex; align-items: baseline; gap: 10px;
  color: var(--paper-faint);
}
.donut-legend-val .num {
  color: var(--paper);
  font-size: 13px;
  font-weight: 600;
}

/* === TABLE === */
.table-wrap { overflow-x: auto; }
table.t {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-body);
}
table.t thead tr {
  border-bottom: 1px solid var(--rule);
}
table.t th {
  text-align: left;
  padding: 14px 16px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--paper-faint);
  font-weight: 500;
}
table.t tbody tr {
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.15s;
}
table.t tbody tr:hover { background: rgba(255,255,255,0.025); }
table.t tbody tr.row-active { background: rgba(230,57,70,0.08); }
table.t td {
  padding: 14px 16px;
  font-size: 13px;
  color: var(--paper);
  vertical-align: middle;
}
.mono { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.01em; }
.mono-sm { font-family: var(--font-mono); font-size: 10px; }
.dim { color: var(--paper-dim); }
.faint { color: var(--paper-faint); }

/* Chips */
.chip {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 3px 7px;
  border: 1px solid var(--rule-2);
}
.chip-on { background: var(--paper); color: var(--ink); border-color: var(--paper); }
.chip-off { color: var(--paper-faint); }
.chip-pmm { background: var(--accent); color: var(--paper); border-color: var(--accent); }
.chip-status-success { color: var(--positive); border-color: var(--rule-2); }
.chip-status-failure { background: var(--accent); color: var(--paper); border-color: var(--accent); }
.chip-status-cancelled { color: var(--paper-faint); }
.chip-outcome-INTERESTED { color: var(--accent); border-color: var(--accent-dim); }
.chip-outcome-ALREADY_SELLING { color: var(--paper); }
.chip-outcome-NOT_INTERESTED { color: var(--paper-dim); }
.chip-outcome-NOT_INTERESTED_NO_PHOTO { color: var(--paper-faint); }

/* === FILTER PILLS === */
.filter-pills {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.filter-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 8px;
  background: var(--paper);
  color: var(--ink);
  border: 0;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-pill:hover { background: var(--accent); color: var(--paper); }
.clear-all {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  background: transparent;
  border: 0;
  cursor: pointer;
  padding: 4px 4px;
}
.clear-all:hover { text-decoration: underline; }

/* === BUTTONS === */
.btn {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 9px 16px;
  border: 1px solid;
  cursor: pointer;
  transition: all 0.18s;
}
.btn-primary {
  background: var(--accent); color: var(--paper); border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
.btn-ghost {
  background: transparent; color: var(--paper); border-color: var(--rule-2);
}
.btn-ghost:hover { border-color: var(--paper); }
.btn-paper {
  background: var(--paper); color: var(--ink); border-color: var(--paper);
}
.btn-paper:hover { background: transparent; color: var(--paper); }

/* === SIDE PANEL (job detail) === */
.panel-backdrop {
  position: fixed; inset: 0;
  background: rgba(10,9,8,0.7);
  backdrop-filter: blur(4px);
  z-index: 50;
}
.panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 520px; max-width: 96vw;
  background: var(--ink-2);
  border-left: 1px solid var(--rule);
  z-index: 60;
  overflow-y: auto;
  animation: panel-in 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}
@keyframes panel-in {
  from { transform: translateX(40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.panel-head {
  position: sticky; top: 0;
  background: var(--ink-2);
  border-bottom: 1px solid var(--rule);
  padding: 20px 24px;
  display: flex; align-items: flex-start; justify-content: space-between;
  z-index: 5;
}
.panel-head .id-block {}
.panel-head .id-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--paper-faint);
}
.panel-head .id-num {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 30px;
  letter-spacing: -0.03em;
  color: var(--paper);
  margin-top: 4px;
}
.panel-close {
  background: transparent; border: 1px solid var(--rule-2);
  color: var(--paper); font-size: 16px;
  width: 32px; height: 32px;
  cursor: pointer;
  transition: all 0.15s;
}
.panel-close:hover { background: var(--accent); border-color: var(--accent); }
.panel-body { padding: 24px; display: flex; flex-direction: column; gap: 24px; }
.panel-section { display: flex; flex-direction: column; gap: 8px; }

/* Photos in panel */
.photo-tile {
  background: var(--ink);
  border: 1px solid var(--rule);
  overflow: hidden;
  cursor: zoom-in;
  position: relative;
  transition: border-color 0.15s;
}
.photo-tile:hover { border-color: var(--paper-faint); }
.photo-tile img {
  width: 100%; height: auto;
  display: block;
  max-height: 360px;
  object-fit: cover;
}
.photo-tile-label {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-top: 1px solid var(--rule);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--paper-dim);
}
.photo-tile-label .hint { font-size: 9px; color: var(--paper-faint); }

.photo-placeholder {
  aspect-ratio: 4/3;
  background: var(--ink);
  border: 1px dashed var(--rule-2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 12px;
  text-align: center;
}

/* Brand stock chips in panel */
.brand-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}
.brand-cell {
  background: var(--ink-2);
  padding: 14px 8px;
  text-align: center;
}
.brand-cell-on { background: var(--ink-3); }
.brand-cell-name {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--paper-faint);
  margin-bottom: 6px;
}
.brand-cell-pmm .brand-cell-name { color: var(--accent); }
.brand-cell-mark {
  font-family: var(--font-display);
  font-size: 22px;
  line-height: 1;
  color: var(--paper-faint);
}
.brand-cell-on .brand-cell-mark { color: var(--paper); }
.brand-cell-pmm.brand-cell-on .brand-cell-mark { color: var(--accent); }

/* === LIGHTBOX === */
.lightbox {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,9,8,0.95);
  display: flex; flex-direction: column;
}
.lightbox-head {
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--rule);
  color: var(--paper);
}
.lightbox-head .label {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 18px;
}
.lightbox-close {
  background: transparent; border: 1px solid var(--rule-2);
  color: var(--paper); width: 36px; height: 36px;
  font-size: 18px; cursor: pointer;
}
.lightbox-close:hover { background: var(--accent); border-color: var(--accent); }
.lightbox-body {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  cursor: zoom-out;
}
.lightbox-body img {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  cursor: default;
}
.lightbox-foot {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--paper-faint);
  padding: 12px;
}

/* === ADMIN / UPLOAD === */
.admin-banner {
  background: var(--ink-2);
  border: 1px solid var(--accent-dim);
  border-left-width: 3px;
  padding: 16px 20px;
  display: flex; flex-direction: column; gap: 6px;
}
.upload-zone {
  border: 1px dashed var(--rule-2);
  background: var(--ink-2);
  padding: 56px 28px;
  text-align: center;
  transition: all 0.2s;
  min-height: 240px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.upload-zone-active {
  border-color: var(--accent);
  background: rgba(230,57,70,0.04);
}
.upload-zone-busy { border-color: var(--paper); }
.upload-icon {
  width: 56px; height: 56px;
  border: 1px solid var(--paper-dim);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 24px;
  font-family: var(--font-display); font-weight: 300;
  color: var(--paper);
  margin-bottom: 14px;
}
.upload-progress { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.spin {
  width: 32px; height: 32px;
  border: 1px solid var(--rule-2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.upload-error {
  margin-top: 20px;
  padding: 12px 16px;
  background: rgba(230,57,70,0.08);
  border: 1px solid var(--accent-dim);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 12px;
  text-align: left;
  max-width: 540px;
}

/* === LOADER === */
#loader {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--ink);
  z-index: 1000;
}
#loader .spin { margin-bottom: 16px; }
#loader .label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--paper-faint);
}

/* === ANIMATIONS — staggered fade-in on initial load === */
@keyframes rise {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.rise-1 { animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both; }
.rise-2 { animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.12s both; }
.rise-3 { animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both; }
.rise-4 { animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.28s both; }
.rise-5 { animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.36s both; }

/* === UTILITY === */
.flex { display: flex; }
.grid { display: grid; }
.items-center { align-items: center; }
.items-end { align-items: flex-end; }
.items-baseline { align-items: baseline; }
.justify-between { justify-content: space-between; }
.justify-end { justify-content: flex-end; }
.flex-col { flex-direction: column; }
.flex-wrap { flex-wrap: wrap; }
.flex-1 { flex: 1; }
.gap-1 { gap: 4px; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.gap-5 { gap: 20px; }
.gap-6 { gap: 24px; }
.gap-8 { gap: 32px; }

.mt-1 { margin-top: 4px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }

.p-4 { padding: 16px; }
.p-5 { padding: 20px; }
.p-6 { padding: 24px; }
.px-6 { padding-left: 24px; padding-right: 24px; }
.py-4 { padding-top: 16px; padding-bottom: 16px; }
.py-6 { padding-top: 24px; padding-bottom: 24px; }

.w-full { width: 100%; }
.max-w-prose { max-width: 64ch; }
.text-center { text-align: center; }
.text-right { text-align: right; }
.uppercase { text-transform: uppercase; }
.italic { font-style: italic; }
.cursor-pointer { cursor: pointer; }
.break-all { word-break: break-all; }
.relative { position: relative; }

.list-bullet { list-style: none; padding: 0; margin: 8px 0 0; }
.list-bullet li {
  position: relative;
  padding-left: 16px;
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 6px;
}
.list-bullet li::before {
  content: '—';
  position: absolute; left: 0;
  color: var(--paper-faint);
}

.divide-rule > * + * { border-top: 1px solid var(--rule); }

/* === MOBILE === */
@media (max-width: 900px) {
  :root { --sidebar-w: 72px; }
  .sidebar-brand { padding: 16px 8px; text-align: center; }
  .sidebar-brand .brand-line, .sidebar-brand .brand-client, .sidebar-brand::after { display: none; }
  .sidebar-brand::before {
    content: 'NF';
    display: block;
    font-family: var(--font-display); font-weight: 400;
    font-size: 28px; font-style: italic;
    color: var(--accent);
    letter-spacing: -0.04em;
  }
  .sidebar-item { padding: 12px 8px; align-items: center; text-align: center; }
  .sidebar-item-row { flex-direction: column; gap: 2px; }
  .sidebar-item-label { font-size: 10px; }
  .sidebar-item-idx { display: none; }
  .sidebar-item-sub { display: none; }
  .sidebar-section-divider { padding: 10px 8px 6px; text-align: center; }
  .sidebar-foot { display: none; }
  .content { padding: 20px 16px 40px; }
  .kpi-hero-grid { grid-template-columns: 1fr 1fr; }
  .xcut-grid { grid-template-columns: 1fr 1fr; }
  .h-display { font-size: 30px; }
  .h-section { font-size: 22px; }
  .kpi-hero .kpi-num { font-size: 54px; }
  .kpi-num { font-size: 40px; }
  .status-strip { font-size: 9px; }
  .status-strip > div { padding: 0 12px; }
  .filters-bar { padding: 12px 16px; gap: 6px; }
  .panel { width: 100%; }
}

@media (max-width: 600px) {
  .grid-2-cols { grid-template-columns: 1fr !important; }
}

</style>

  // -- Classify outcome by scanning ai messages for terminal markers
  function classifyOutcome(messages) {

    for (let i = 0; i < messages.length; i++) {
      if (messages[i].Role !== "ai") continue;
      const text = (messages[i].Message || "").toLowerCase();

        if (next.Role !== "human" || next.Message.startsWith("[Image:")) continue;

        if (/^(ya|yes|y|tidak|tak|no|n|berminat|minat|tak\s*berminat|nak\s+jual)$/i.test(v)) continue;
        if (/^\+?\d[\d\s\-]{6,}$/.test(v)) continue; // skip phone numbers
        // Stop searching if we hit the dispenser prompt or survey complete
        // (means name was never given)
        if (j > namePromptIdx + 10) break;
        name = v;
        break;
      }

    // Contact = first human reply after contact prompt that looks like a phone number.
    // If the AI says "Invalid format" we keep searching for the corrected number.
    if (contactPromptIdx !== -1) {
      for (let j = contactPromptIdx + 1; j < messages.length; j++) {
        const next = messages[j];
        if (next.Role !== "human" || next.Message.startsWith("[Image:")) continue;
        const v = next.Message.trim();
        if (!/^\+?\d[\d\s\-]{6,}$/.test(v)) continue; // must look like phone
        // The LAST valid phone number wins (handles "Invalid format" retries
        // where the first phone was rejected and a corrected one was sent)
        // BUT we need to make sure we don't go past the survey close.
        // Check: is there an AI "Survey complete" between this and the prompt?
        let pastClose = false;
        for (let k = contactPromptIdx + 1; k < j; k++) {
          if (messages[k].Role === "ai") {
            const t = (messages[k].Message || "").toLowerCase();
            if (t.includes("survey complete") || t.includes("tinjauan selesai")) {

  // -- Find the human reply that contains the brand answer (comes after the "1. Dunhill 2. Mevius..." prompt)
  function findBrandReply(messages) {
    for (let i = 0; i < messages.length - 1; i++) {
      const m = messages[i];
      if (m.Role !== "ai") continue;
      const text = (m.Message || "");
      if (text.includes("1. Dunhill") || text.includes("**1. Dunhill**")) {
        // Find the next human msg that LOOKS like a brand answer (has numbers OR brand names)
        for (let j = i + 1; j < messages.length; j++) {
          const next = messages[j];
          if (next.Role !== "human" || next.Message.startsWith("[Image:")) continue;
          const v = next.Message.trim().toLowerCase();
          // Must contain at least one of: numbered list, brand name, or negation
          const hasNumbered = /\b[1-5]\b.*?(yes|no|ya|tak|tidak)/i.test(v);

  function findDuration(messages) {

      const text = (m.Message || "").toLowerCase();
      if (text.includes("how long has this store not been selling") ||

        for (let j = i + 1; j < messages.length; j++) {
          const next = messages[j];
          if (next.Role === "ai") {

  // -- Extract photo IDs (in order) from [Image: ...] markers in human messages
  function extractPhotos(messages) {
    const photos = [];
    messages.forEach(m => {
      if (m.Role !== "human") return;
      const match = (m.Message || "").match(/\[Image:\s*([^\]]+)\]/);
      if (match) photos.push(match[1].trim());

    return photos;
  }

  // -- Guess region+city from owner contact prefix or fall back to "Unknown".
  //    For this prototype we don't have real address data per job, so we'll
  //    leave region/city blank when uploading real ZIPs. The dashboard handles this.
  function guessRegion(job) {
    // The real ZIP doesn't contain region data — left blank for honesty
    return { region: "Unknown", city: "Unknown" };
  }

  // -- Main pipeline: zip -> array of derived jobs
  async function processZip(zip, onProgress) {
    onProgress && onProgress({ stage: "reading", message: "Reading ZIP contents..." });

    const files = Object.keys(zip.files);
    const csvNames = files.filter(f => f.toLowerCase().endsWith(".csv"));
    const imageNames = files.filter(f => /\.(jpg|jpeg|png)$/i.test(f));

    if (!csvNames.some(n => /jobs\.csv$/i.test(n))) {
      throw new Error("Could not find jobs.csv in ZIP. Expected files: jobs.csv, conversation.csv, tasks.csv");
    }
    if (!csvNames.some(n => /conversation\.csv$/i.test(n))) {
      throw new Error("Could not find conversation.csv in ZIP.");

    onProgress && onProgress({ stage: "parsing", message: "Parsing jobs.csv..." });
    const jobsFile = csvNames.find(n => /jobs\.csv$/i.test(n));
    const jobsCsv = await zip.files[jobsFile].async("string");
    const jobs = parseCSV(jobsCsv);

    onProgress && onProgress({ stage: "parsing", message: "Parsing conversation.csv..." });
    const convFile = csvNames.find(n => /conversation\.csv$/i.test(n));

          if (base !== name) imageBlobs[base] = url;

    // Build derived job records
    const derived = [];
    for (const j of jobs) {
      const jobId = j["Job ID"];
      const msgs = byJob[jobId] || [];
      const status = (j["Status"] || "").toLowerCase();

      const photos = extractPhotos(msgs);
      const photoShopFront = photos[0] || null;
      const photoDispenser = photos[1] || null;

      let outcome = null;
      let brands = { Dunhill: null, Mevius: null, LD: null, Marlboro: null, Chesterfield: null };
      let ownerName = null, ownerContact = null, duration = null;

      if (status === "success" && msgs.length > 0) {
        outcome = classifyOutcome(msgs);
        const brandReply = findBrandReply(msgs);
        if (brandReply) {
          const parsed = parseBrandReply(brandReply);
          if (parsed) brands = parsed;
        }
        if (outcome === "INTERESTED") {
          const info = findOwnerInfo(msgs);
          ownerName = info.name;
          ownerContact = info.contact;
        }
        if (outcome === "INTERESTED" || outcome === "NOT_INTERESTED" || outcome === "NOT_INTERESTED_NO_PHOTO") {
          duration = findDuration(msgs);
        }
      }

      const loc = guessRegion(j);

      // Date / created — be tolerant of formats
      const date = (j["Date"] || (j["Created At"] || "").slice(0, 10) || "").trim();
      const createdAt = (j["Created At"] || "").trim();

      derived.push({
        jobId: jobId,
        date: date,
        region: loc.region,
        city: loc.city,
        status: status,
        outcome: outcome,
        brands: brands,
        interestedInPmm: outcome === "INTERESTED" ? true
                       : (outcome === "NOT_INTERESTED" || outcome === "NOT_INTERESTED_NO_PHOTO") ? false
                       : null,
        ownerName: ownerName,
        ownerContact: ownerContact,
        howLongNoPmm: duration,
        photoShopFront: photoShopFront,
        photoDispenser: photoDispenser,
        createdAt: createdAt,
        _agent: j["Telegram First Name"] || null,
        _agentTgId: j["Telegram User ID"] || null,

    }

    onProgress && onProgress({ stage: "done", message: "Parsed " + derived.length + " jobs" });

    return {
      jobs: derived,
      images: imageBlobs,
      meta: {
        totalJobs: jobs.length,
        totalImages: imageNames.length,
        totalMessages: allMessages.length,
        files: { csv: csvNames.length, images: imageNames.length },

  return { processZip, parseCSV, parseBrandReply, classifyOutcome };

// Build the merged pool from a list of batches.
// Batches are applied in order (older → newer); newer wins for duplicate Job IDs.
// The demo batch (batchId 0) is special — it only contributes jobs that aren't
// in any uploaded batch, so real data always wins over demo.
function mergeBatches(batches, demoJobs) {
  const map = {};
  // 1) Apply uploaded batches (non-demo) in order
  const uploaded = batches.filter(b => !b.isDemo).sort((a, b) => a.batchId - b.batchId);
  uploaded.forEach(b => {
    if (!b.raw) return;

    });
  }
  return {
    jobs: Object.values(map)
  };
